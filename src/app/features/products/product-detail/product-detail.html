    @if (product(); as item) {
      <div class="detail-container">
        <h1>{{ item.name }}</h1>
        <p>{{ item.description }}</p>
         <p>Categoría: <strong>{{ item.category.name }}</strong></p>
    <p>Estado: <strong>{{ item.status.name }}</strong></p>
    <p>Condición: <strong>{{ item.condition.name }}</strong></p>
        <h3>Ubicación de entrega</h3>
        <!-- Pasamos coordenadas fijas por ahora o desde el objeto si las tienes -->
            <app-map [lat]="+item.latitude" [lng]="+item.longitude" />
        
        <button class="btn-primary">Contactar para recoger</button>
      </div>
    }
    <pre>{{ product() | json }}</pre>
