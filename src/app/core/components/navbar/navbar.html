<header
  class="sticky top-0 z-50 w-full border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 md:px-10 py-3">
  <div  class="mx-auto flex max-w-7xl items-center justify-between gap-4">
    <!-- Logo -->
    <div routerLink="/" class="flex items-center gap-2 shrink-0 cursor-pointer" title="Ir al inicio">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
        <span class="material-symbols-outlined text-2xl group-hover:rotate-12 transition-transform duration-300">eco</span>
      </div>
      <h1 class="hidden text-xl font-bold tracking-tight text-primary sm:block">EcoRegalo</h1>
    </div>

    <!-- Buscador (Aquí luego usaremos [(ngModel)] o Reactive Forms) -->
    <div class="flex flex-1 max-w-md items-center">
      <div class="relative w-full">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/60">search</span>
        <input
          class="w-full rounded-lg border-primary/20 bg-primary/5 py-2 pl-10 pr-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
          placeholder="Buscar objetos..." type="text" />
      </div>
    </div>

    <!-- Acciones -->
    <div class="flex items-center gap-4">
      <button (click)="handlePublicar()" 
        class="hidden md:flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white hover:bg-primary/90 transition-colors">
        <span class="material-symbols-outlined text-sm">add_circle</span>
        Publicar Objeto
      </button>
      @if (authService.isAuthenticated()) {
      <!-- FOTO DE PERFIL (Stitch): Solo si está logueado. Lleva a Mis Objetos -->
      <div (click)="goToManageList()"
        class="h-10 w-10 rounded-full border-2 border-primary/20 bg-cover bg-center cursor-pointer hover:ring-2 hover:ring-primary/40 transition-all"
        title="Mis Objetos" 
         [style.backgroundImage]="authService.currentUser()?.photo ? 'url(' + authService.currentUser()?.photo + ')' : 'url(media/person.png)'">
      </div><button (click)="onLogout()" class="text-red-500 font-bold">Salir</button>
      } @else {
      <!-- ICONO PERSONA (Stitch): Si NO está logueado. Lleva al Login -->
      <button routerLink="/auth/login"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
        <span class="material-symbols-outlined">person</span>
      </button>
      }
    </div>
  </div>
</header>
