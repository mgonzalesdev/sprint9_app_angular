<header
  class="sticky top-0 z-50 w-full border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 md:px-10 py-3">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4">
    <!-- Logo -->
    <div routerLink="/" class="flex items-center gap-2 shrink-0 cursor-pointer" title="Ir al inicio">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
        <span
          class="material-symbols-outlined text-2xl group-hover:rotate-12 transition-transform duration-300">eco</span>
      </div>
      <h1 class="hidden text-xl font-bold tracking-tight text-primary sm:block">EcoRegalo</h1>
    </div>

    <!-- Buscador (Aquí luego usaremos o Reactive Forms) -->
    <div class="flex flex-1 max-w-md items-center">
      <div class="relative w-full">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/60">search</span>
        <input [formControl]="searchControl" type="text"
          class="w-full rounded-lg border-primary/20 bg-primary/5 py-2 pl-10 pr-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all"
          placeholder="Buscar un regalo..." type="text" />
        @if (searchControl.value) {
        <button type="button" (click)="searchControl.setValue('')"
          class="absolute right-2 top-1/2 -translate-y-1/2 h-7 w-7 flex items-center justify-center rounded-full hover:bg-primary/10 text-primary/40 hover:text-primary transition-all animate-in fade-in zoom-in"
          title="Limpiar búsqueda">
          <span class="material-symbols-outlined text-lg">close</span>
        </button>
        }
      </div>
    </div>

    <!-- Acciones -->
    <div class="flex items-center gap-3">
      <button (click)="handlePublicar()"
        class="hidden md:flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary/90 hover:shadow-lg hover:shadow-primary/20 transition-all active:scale-95">
        <span class="material-symbols-outlined text-sm">add_circle</span>
        Publicar regalo
      </button>
      @if (authService.isAuthenticated()) {
      <!-- FOTO DE PERFIL (Stitch): Solo si está logueado. Lleva a Mis Objetos -->
      <div (click)="goToManageList()"
         class="h-10 w-10 rounded-xl border-2 border-primary/20 bg-cover bg-center cursor-pointer hover:border-primary transition-all shadow-sm relative"
       title="Mis Objetos"
        [style.backgroundImage]="authService.currentUser()?.photo ? 'url(' + authService.currentUser()?.photo + ')' : 'url(media/person.png)'">
        <span class="absolute -bottom-1 -right-1 h-3 w-3 rounded-full bg-emerald-500 border-2 border-white"></span>
      </div>

      <button (click)="onLogout()"
        class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50/50 rounded-lg transition-colors"
        title="Cerrar Sesión">
        <span class="material-symbols-outlined text-[22px]">logout</span>
      </button>
      } @else {
      <!-- ICONO PERSONA (Stitch): Si NO está logueado. Lleva al Login -->
      <button routerLink="/auth/login"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
        <span class="material-symbols-outlined">person</span>
      </button>
      }
    </div>
  </div>
</header>
@if (showLogoutModal()) {
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/40 backdrop-blur-sm p-4 animate-in fade-in duration-300">

  <!-- Modal con estilo Glass Panel (como tu login) -->
  <div
    class="glass-panel p-8 rounded-xl shadow-2xl max-w-sm w-full transform transition-all scale-100 border border-white/20">

    <div class="text-center">
      <!-- Icono Eco (Mismo estilo que tu logo) -->
      <div
        class="mx-auto flex items-center justify-center w-16 h-16 bg-primary-600 rounded-xl mb-6 shadow-lg shadow-primary-200">
        <span class="material-symbols-outlined text-white text-3xl"
          style="font-variation-settings: 'FILL' 1;">eco</span>
      </div>

      <h3 class="text-2xl font-bold text-neutral-900 tracking-tight">¿Cerrar sesión?</h3>
      <p class="text-neutral-600 mt-2">Esperamos verte pronto de vuelta en <span
          class="font-semibold text-primary-700">EcoRegalo</span>.</p>
    </div>

    <!-- Botones con tus estilos de formulario -->
    <div class="mt-8 flex flex-col gap-3">
      <button (click)="confirmLogout()"
        class="w-full py-3 px-4 rounded-lg shadow-sm text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 transition-all transform active:scale-95">
        Cerrar Sesión
      </button>

      <button (click)="showLogoutModal.set(false)"
        class="w-full py-3 px-4 rounded-lg text-sm font-medium text-neutral-600 hover:bg-neutral-100 transition-all">
        Cancelar
      </button>
    </div>
  </div>
</div>
}
