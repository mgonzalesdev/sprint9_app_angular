<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
    <div class="text-center mb-8">
      <span class="text-4xl">🔐</span>
      <h2 class="text-3xl font-extrabold text-slate-800 mt-4">Bienvenido de nuevo</h2>
      <p class="text-slate-500">Ingresa para gestionar tus regalos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Correo electrónico</label>
        <input formControlName="email" type="email" placeholder="tu@correo.com"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
        <input formControlName="password" type="password" placeholder="••••••••"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
      </div>

      @if (errorMessage()) {
        <p class="text-red-500 text-sm font-medium animate-bounce">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="loginForm.invalid"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95 disabled:bg-slate-300">
        Iniciar Sesión
      </button>

      <p class="text-center text-sm text-slate-500">
        ¿No tienes cuenta? 
        <a routerLink="/auth/register" class="text-indigo-600 font-bold hover:underline">Regístrate gratis</a>
      </p>
    </form>
  </div>
</div>
