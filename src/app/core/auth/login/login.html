<div class="text-center mb-8">
  <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-600 rounded-xl mb-4 shadow-lg shadow-primary-200">
    <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">eco</span>
  </div>
  <h1 class="text-3xl font-bold text-neutral-900 tracking-tight">EcoRegalo</h1>
  <p class="text-neutral-600 mt-2">¡Bienvenido de nuevo! Por favor ingresa tus datos.</p>
</div>

<div class="glass-panel p-8 rounded-xl shadow-2xl">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-neutral-700 mb-1">Correo Electrónico</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-sm">mail</span>
        <input formControlName="email" type="email"
               class="block w-full pl-10 pr-3 py-2.5 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none bg-white/50"
               placeholder="nombre@ejemplo.com">
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-medium text-neutral-700 mb-1">Contraseña</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-sm">lock</span>
        <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
               class="block w-full pl-10 pr-10 py-2.5 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none bg-white/50"
               placeholder="••••••••">
        <button type="button" (click)="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600">
          <span class="material-symbols-outlined text-sm">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid"
            class="w-full py-3 px-4 rounded-lg shadow-sm text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 transition-all transform active:scale-95 disabled:opacity-50">
      Iniciar Sesión
    </button>
  </form>

  <p class="mt-8 text-center text-sm text-neutral-600">
    ¿No tienes cuenta? 
    <a routerLink="/auth/register" class="font-medium text-primary-700 hover:text-primary-800 transition-colors">Regístrate gratis</a>
  </p>
</div>
