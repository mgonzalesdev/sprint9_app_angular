<div class="p-4 relative">

  <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-200">
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>

  @if (showModal) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
      <h3 class="text-lg font-bold mb-4 text-gray-800">Evento para {{ selectedDateStr }}</h3>

      <input [(ngModel)]="newEventTitle" type="text" placeholder="¿Qué vas a hacer?"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mb-4" />

      <div class="flex justify-end gap-2">
        <button (click)="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-md">
          Cancelar
        </button>
        <button (click)="saveEvent()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
          Guardar
        </button>
      </div>
    </div>
  </div>
  }
</div>
