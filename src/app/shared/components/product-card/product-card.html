<div class="group bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden cursor-pointer"
      [routerLink]="['/product', product().id]">

      <div
            class="h-48 bg-slate-100 flex items-center justify-center text-4xl group-hover:scale-105 transition-transform duration-500">

            <img src="/placeholder.jpg" alt="Articulo">
      </div>

      <div class="p-5">
            <div class="flex justify-between items-start mb-2">
                  <h3 class="text-lg font-bold text-slate-800 line-clamp-1">{{ product().name }}</h3>
            </div>

            <p class="text-slate-600 text-sm line-clamp-2 mb-4 h-10">
                  {{ product().description }}
            </p>

            <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                  <span class="text-xs font-medium text-slate-400 bg-slate-100 px-2 py-1 rounded">
                        {{ product().publicationDate | date:'mediumDate' }}
                  </span>
                  <button (click)="$event.stopPropagation(); onClaim()"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors shadow-md active:scale-95">
                        ¡Lo quiero!
                  </button>
            </div>
      </div>
</div>
